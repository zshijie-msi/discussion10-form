<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Grocery Pickup Form</title>
  <link rel="stylesheet" href="css/style.css"/>

</head>
<body>
<form action="https://formspree.io/f/xgondrev" method="post">
        <fieldset>
            <legend>Form</legend>
            <label for="first-name">First Name <span class="required">(Required)</span></label>
            <input type="text" id="first-name" name="first-name" required>

            <label for="last-name">Last Name <span class="required">(Required)</span></label>
            <input type="text" id="last-name" name="last-name" required>

            <label for="email">Email <span class="required">(Required)</span></label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone">

            <label for="program">Program</label>
            <input type="text" id="program" name="program">

            <label for="household-size">Household Size</label>
            <input type="number" id="household-size" name="household-size" min="1">
        </fieldset>

        <fieldset>
            <legend>Available Time for Picking Up Grocery <span class="required">(Required)</span></legend>

            <div class="radio-option">
                <input type="radio" id="morning" name="available-time" value="morning" required>
                <label for="morning">Morning</label>
            </div>

            <div class="radio-option">
                <input type="radio" id="afternoon" name="available-time" value="afternoon">
                <label for="afternoon">Afternoon</label>
            </div>

            <div class="radio-option">
                <input type="radio" id="evening" name="available-time" value="evening">
                <label for="evening">Evening</label>
            </div>

            <div class="radio-option">
                <input type="radio" id="weekend" name="available-time" value="weekend">
                <label for="weekend">Weekend</label>
            </div>
        </fieldset>
            <input type="submit" value="Submit">
    </form>
</body>
</html>
